<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lbs Wallet</title>
  <style>
    :root {
      --ink: #11202d;
      --muted: #516575;
      --surface: #fffefb;
      --surface-2: #f8f4ed;
      --line: #d4c6b5;
      --brand: #0c6e7b;
      --brand-2: #f3a03d;
      --ok-bg: #e8f8ee;
      --ok-fg: #1b6a3a;
      --danger-bg: #fdebea;
      --danger-fg: #7b1c1c;
      --shadow: 0 16px 40px rgba(17, 32, 45, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      color: var(--ink);
      font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 15%, rgba(243, 160, 61, 0.2), transparent 30%),
        radial-gradient(circle at 90% 5%, rgba(12, 110, 123, 0.22), transparent 32%),
        linear-gradient(160deg, #fefbf4 0%, #edf6f8 100%);
      animation: pageFade 0.55s ease-out;
    }

    .card {
      width: min(100%, 680px);
      margin: 18px auto;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px;
      background: linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: 1.85rem;
      letter-spacing: 0.2px;
    }

    .sub {
      margin: 6px 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .balances {
      margin-top: 4px;
      padding: 12px;
      border-radius: 12px;
      border: 1px dashed #a8bcc8;
      background: #f7fcff;
      font-weight: 700;
    }

    .row {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 10px;
      align-items: center;
    }

    label {
      font-size: 0.93rem;
      color: var(--muted);
    }

    input,
    select,
    button {
      font: inherit;
      border-radius: 11px;
      border: 1px solid #b8c9d2;
      padding: 10px 12px;
      transition: transform 0.16s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(12, 110, 123, 0.16);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      color: #0f2833;
      background: #ffffff;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 14px rgba(17, 32, 45, 0.12);
    }

    #transferBtn {
      border-color: #0f7f8d;
      color: #ffffff;
      background: linear-gradient(120deg, var(--brand) 0%, #0f8f9f 100%);
    }

    #refreshBtn {
      border-color: #8ea7b5;
      background: #f1f7fa;
    }

    #notifyBtn {
      border-color: #d58a2f;
      background: linear-gradient(120deg, #ffd199 0%, var(--brand-2) 100%);
    }

    .status {
      margin-top: 14px;
      font-weight: 700;
      min-height: 20px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f1f4f7;
      border: 1px solid #d4dde2;
    }

    .status:empty {
      display: none;
    }

    .history-title {
      margin: 18px 0 8px;
      font-size: 1.05rem;
    }

    .history {
      margin: 0;
      padding-left: 22px;
      color: #284556;
    }

    .history li {
      margin-bottom: 6px;
      animation: riseIn 0.24s ease both;
    }

    @keyframes pageFade {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(3px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 16px;
        border-radius: 14px;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>lbs Wallet</h1>
    <p class="sub">Move funds between users and review recent activity.</p>

    <div class="balances" id="balances">Loading balances...</div>

    <div class="row">
      <label for="fromUser">From</label>
      <select id="fromUser">
        <option value="user1">user1</option>
        <option value="user2">user2</option>
      </select>
    </div>

    <div class="row">
      <label for="toUser">To</label>
      <select id="toUser">
        <option value="user1">user1</option>
        <option value="user2">user2</option>
      </select>
    </div>

    <div class="row">
      <label for="amount">Amount (Sek)</label>
      <input id="amount" type="number" min="0" step="0.01" value="5.00" />
    </div>

    <div class="actions">
      <button id="transferBtn" type="button">Transfer</button>
      <button id="refreshBtn" type="button">Refresh Balances</button>
      <button id="notifyBtn" type="button">Support</button>
    </div>

    <div class="status" id="status"></div>

    <h3 class="history-title">Recent Transfers (last 5)</h3>
    <ul class="history" id="historyList">
      <li>No transfers yet.</li>
    </ul>
  </div>

  <script>
    function readBalances() {
      if (!window.WalletBridge || !window.WalletBridge.getAllBalances) {
        document.getElementById('balances').textContent = 'Wallet bridge is unavailable.';
        return;
      }

      const payload = window.WalletBridge.getAllBalances();
      try {
        const data = JSON.parse(payload);
        document.getElementById('balances').textContent =
          `user1: ${Number(data.user1).toFixed(2)} SEK | user2: ${Number(data.user2).toFixed(2)} SEK`;
      } catch (e) {
        document.getElementById('balances').textContent = 'Failed to read balances.';
      }
    }

    function readHistory() {
      const historyList = document.getElementById('historyList');

      if (!window.WalletBridge || !window.WalletBridge.getTransferHistory) {
        historyList.innerHTML = '<li>Transfer history unavailable.</li>';
        return;
      }

      const payload = window.WalletBridge.getTransferHistory();
      try {
        const items = JSON.parse(payload);
        if (!Array.isArray(items) || items.length === 0) {
          historyList.innerHTML = '<li>No transfers yet.</li>';
          return;
        }

        historyList.innerHTML = '';
        items.forEach(function (entry) {
          const li = document.createElement('li');
          li.textContent = entry;
          historyList.appendChild(li);
        });
      } catch (e) {
        historyList.innerHTML = '<li>Failed to load transfer history.</li>';
      }
    }

    document.getElementById('transferBtn').addEventListener('click', function () {
      const fromUser = document.getElementById('fromUser').value;
      const toUser = document.getElementById('toUser').value;
      const amount = document.getElementById('amount').value;

      if (!window.WalletBridge || !window.WalletBridge.transfer) {
        document.getElementById('status').textContent = 'Wallet bridge is unavailable.';
        return;
      }

      const result = window.WalletBridge.transfer(fromUser, toUser, amount);
      document.getElementById('status').textContent = result;
      readBalances();
      readHistory();
    });

    document.getElementById('refreshBtn').addEventListener('click', function () {
      readBalances();
      readHistory();
      document.getElementById('status').textContent = 'Balances refreshed.';
    });

    document.getElementById('notifyBtn').addEventListener('click', function () {
      if (!window.WalletBridge || !window.WalletBridge.sendDemoNotification) {
        document.getElementById('status').textContent = 'Wallet bridge is unavailable.';
        return;
      }

      const notifyUrl = 'file:///android_asset/support_busy.html';
      const result = window.WalletBridge.sendDemoNotification(notifyUrl);
      document.getElementById('status').textContent = result;
    });

    readBalances();
    readHistory();
  </script>
</body>
</html>
